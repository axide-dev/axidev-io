name: Build (Linux)
description: Build, test, and optionally package axidev-io on Linux with build.py.

inputs:
  arch:
    description: Architecture label used for artifact naming (e.g. x64, arm64)
    required: true
  build-tests:
    description: Compatibility input retained for workflow callers
    required: false
    default: "false"
  build-integration-tests:
    description: Build the interactive integration binaries
    required: false
    default: "false"
  run-tests:
    description: Run unit tests after building
    required: false
    default: "false"
  package-output:
    description: Package headers and the static library into packages/
    required: false
    default: "false"
  upload-binaries:
    description: Upload built test binaries as artifacts
    required: false
    default: "false"
  artifact-name:
    description: Artifact name (required when upload-binaries=true)
    required: false
  version:
    description: Release version override (otherwise uses tag ref)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Install dependencies (Linux)
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential pkg-config \
          libinput-dev libxkbcommon-dev libudev-dev

    - name: Clean stale build directory
      shell: bash
      run: python build.py clean

    - name: Build library
      if: ${{ inputs.run-tests != 'true' && inputs.build-integration-tests != 'true' && inputs.package-output != 'true' }}
      shell: bash
      run: python build.py build

    - name: Build integration binaries
      if: ${{ inputs.build-integration-tests == 'true' }}
      shell: bash
      run: python build.py integration-binaries

    - name: Run unit tests
      if: ${{ inputs.run-tests == 'true' }}
      shell: bash
      run: python build.py test

    - name: Package (Linux)
      if: ${{ inputs.package-output == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        TAG='${{ inputs.version }}'
        if [ -z "$TAG" ]; then
          TAG="${GITHUB_REF#refs/tags/}"
        fi
        python build.py package --version "$TAG" --arch '${{ inputs.arch }}'

    - name: Upload release package
      if: ${{ inputs.package-output == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: release-package-linux-${{ inputs.arch }}
        path: packages/*.tar.gz

    - name: Upload test binaries
      if: ${{ inputs.upload-binaries == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          build/linux/bin/test_*
