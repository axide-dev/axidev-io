name: Build (Windows)
description: Build, test, and optionally package axidev-io on Windows with build.py.

inputs:
  arch:
    description: Architecture label used for artifact naming (e.g. x64, arm64)
    required: true
  build-tests:
    description: Compatibility input retained for workflow callers
    required: false
    default: "false"
  build-integration-tests:
    description: Build the interactive integration binaries
    required: false
    default: "false"
  run-tests:
    description: Run unit tests after building
    required: false
    default: "false"
  package-output:
    description: Package headers, the static library, LICENSE, and vendor/licenses into packages/
    required: false
    default: "false"
  upload-binaries:
    description: Upload built test binaries as artifacts
    required: false
    default: "false"
  artifact-name:
    description: Artifact name (required when upload-binaries=true)
    required: false
  version:
    description: Release version override (otherwise uses tag ref)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Clean stale build directory
      shell: pwsh
      run: python build.py clean

    - name: Build library
      if: ${{ inputs.run-tests != 'true' && inputs.build-integration-tests != 'true' && inputs.package-output != 'true' }}
      shell: pwsh
      run: python build.py build

    - name: Build integration binaries
      if: ${{ inputs.build-integration-tests == 'true' }}
      shell: pwsh
      run: python build.py integration-binaries

    - name: Run unit tests
      if: ${{ inputs.run-tests == 'true' }}
      shell: pwsh
      run: python build.py test

    - name: Package (Windows)
      if: ${{ inputs.package-output == 'true' }}
      shell: pwsh
      run: |
        # Release archives must carry the project license and vendored third-
        # party license notices. build.py package is the single source of truth
        # for that layout.
        $tag = "${{ inputs.version }}"
        if (-not $tag) {
          $tag = $env:GITHUB_REF -replace '^refs/tags/', ''
        }
        python build.py package --version $tag --arch "${{ inputs.arch }}"

    - name: Upload release package
      if: ${{ inputs.package-output == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: release-package-windows-${{ inputs.arch }}
        path: packages/*.zip

    - name: Upload test binaries
      if: ${{ inputs.upload-binaries == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: |
          build/windows/bin/test_*.exe
